function cutFloat(text)
{
	for (iii=0;iii < text.length;iii++)
	{
		if (text.charAt(iii) == '.')
		{
			return text.substring(0,iii)
		}
	}
	return text
}

function UpdateData()
{
	if (atltest.HasControlToken == true)
	{
		if (b_requestcontrol.value != "Release Control")
		{
			b_requestcontrol.value = "Release Control"
		}
	}
	else
	{
		if (b_requestcontrol.value != "Request Control")
		{
			b_requestcontrol.value = "Request Control"
		}
	}

	if (atltest.ClientListRefreshed == true)
	{
		atltest.StartClientEnumeration()
		clientlist.options.length = 0
	   do {
			name = atltest.NextClient
		if (name != "")
		{		 
			opt = new Option(addSpace(name,padlength), name,false,false)
			clientlist.options[clientlist.options.length] = opt
		}

 		}while (name!="");
	}
	if (atltest.ChatMessagesAvailable > 0)
	{
		addLongMessage(atltest.NextChatMessage)
 	}

	if ((atltest.ClientIsConnected == true ) && (ClientIsConnected == false))
	{
 		ClientIsConnected = true
	   	sessionconnect.innerHTML = "<INPUT TYPE='button' style='font-size: 9px;font-family:arial' NAME='b_sessiondisconnect' Value='Leave Session' onClick='leaveSession()'>" 
	}

	if ((atltest.ClientIsConnected == false ) && (ClientIsConnected == true))
	{
		ClientIsConnected = false
	   	sessionconnect.innerHTML = "<INPUT TYPE='button' style='font-size: 9px;font-family:arial' NAME='b_sessionjoin' Value='Join' onClick='joinSession()'>" 
		sessionconnect.innerHTML += "<INPUT TYPE='button' style='font-size: 9px;font-family:arial' NAME='b_sessioncreate' Value='Create' onClick='createSession()'>"
		clientlist.options.length = 0

 	}

/*
	if ((atltest.DLinProgress == true ) && (atltest.DownloadDataMax>0))
	{
		DownloadInProgress = true
		v=atltest.DownloadDataReceived/atltest.DownloadDataMax*100.0;
	   	downloadstatus.innerHTML = "Download Status:" + cutFloat(v.toString()) + "%" 
 	}
*/
	if ((DownloadInProgress == true) && (atltest.DLinProgress == false ))
	{
		DownloadInProgress = true
 	   	downloadstatus.innerHTML = "" 
	}
		
	if (cameraOperator != atltest.CurrentOperator)
	{
		cameraOperator = atltest.CurrentOperator
		UpdateImages()
	}


	if ((atltest.ServerIsConnected == true ) && (ServerIsConnected == false))
	{
 		ServerIsConnected = true
		b_connecttoserver.value="Disconect\nServer"
 	}

	if ((atltest.ServerIsConnected == false ) && (ServerIsConnected == true))
	{
		ServerIsConnected = false
		b_connecttoserver.value = "Connect\nto Server"
 	}
	
	if ((atltest.ControlActive == true) && (doonce == true))
	{
		doonce = false
		atltest.SetBackgroundColors(0.7, 0.7, 0.7, 1.0, 1.0, 1.0, 50)
	}

	setTimeout("UpdateData()",1000)
}

function RefreshServerList() {
 
   atltest.StartSessionEnumeration();

	sessionlist.options.length = 0

	}

}

	else
		atltest.RequestControlToken(true);

}



function sendChatMessage(message) {

	chattext.value = ""
  	clients = ""
	first = true
	for (i=0; i < clientlist.options.length; i++)
	{
 
			if (clientlist.options[i].selected)
			{
				if (first)
				{
					first = false;
	 				clients = clientlist.options[i].value
				}
				else
				{
 					clients = clients + " " + clientlist.options[i].value
				}
 			}
	}

	addLongMessage(">" + message) 
	atltest.SendChatMessage(clients, message)
}


 

function addLongMessage(message)
{
	newmessage = message
	start = 0
	end = 0
	leng = message.length

  	while (leng-start>padlength_chat)
	{
		newpad = padlength_chat-1
		while (message.charAt(start+newpad) != ' ' && newpad>0)
		{
			newpad--;
		}
		if (newpad==0)
		{
			newpad = padlength_chat-1
		}
 
 		addMessage(message.substring(start,start + newpad))
		start+=newpad
 	}
 	addMessage(message.substring(start,leng))


}




function addMessage(message) {

 


	if (nummessages < maxmessages)
	{
		for (i=0;i < maxmessages-nummessages; i++)
		{
			messages[i] = ""
		}
	}


 	for (i=0;i < maxmessages;i++)
	{
		messages[i] = messages[i+1]
	}

	messages[maxmessages-1] = message
	nummessages++
	chatbox.options.length = 0
 	for (ii=0;ii < maxmessages;ii++)
	{
		opt = new Option(addSpace(messages[ii],padlength_chat), messages[ii],false,false)
		chatbox.options[chatbox.options.length] = opt		
 	}	
	 	
//	chatbox.selectedIndex = 19
//	chatbox.selectedIndex = -1


}


string= function addSpace(t,pl)
{

	if (t.length < pl)
	{
		l = pl - t.length
	for (i=0;i < l;i++)
	{
		t+= "\xa0"
	}
	}
	return t
}

string= function removeSpace(t)
{
	for (i=0;i < t.length;i++)
	{
		if (t.charAt(i) == '\xa0')
		{
			return t.substring(0,i)
 		}
	}
 	return t
}
